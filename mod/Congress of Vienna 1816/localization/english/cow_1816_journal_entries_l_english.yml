l_english:
 je_cow_1816_gbr_postwar_settlement:0 "Postwar Settlement"
 je_cow_1816_gbr_postwar_settlement_reason:0 "Britain enters 1816 as the chief victor over Napoleon, but victory has left debt, demobilization, and diplomatic obligations. Consolidate the postwar settlement by growing the economy and preserving Britain's capacity to lead the European order."
 je_cow_1816_gbr_workshop_world:0 "Workshop of the World"
 je_cow_1816_gbr_workshop_world_reason:0 "Britain's head start in coal, iron, textiles, and shipping can become a durable industrial advantage. Expand the economy to turn wartime supremacy into peacetime industrial leadership."
 je_cow_1816_fra_bourbon_restoration:0 "Bourbon Restoration"
 je_cow_1816_fra_bourbon_restoration_reason:0 "France begins under a restored Bourbon monarchy whose legitimacy is still contested by liberals, Bonapartists, and ultras. Stabilize the realm and rebuild confidence in the restored order."
 je_cow_1816_fra_return_great_power:0 "Return to Great Power"
 je_cow_1816_fra_return_great_power_reason:0 "The defeat of Napoleon reduced French influence, but France remains one of Europe's central powers. Rebuild national strength and prepare France for renewed diplomatic weight."
 je_cow_1816_aus_congress_system:0 "Congress System"
 je_cow_1816_aus_congress_system_reason:0 "Austria stands at the center of the Vienna settlement. Preserve the conservative peace and use Austrian diplomacy to keep revolution and renewed great-power war at bay."
 je_cow_1816_aus_habsburg_crownlands:0 "Habsburg Crownlands"
 je_cow_1816_aus_habsburg_crownlands_reason:0 "The Habsburg monarchy is a composite empire of crownlands, languages, diets, and privileges. Strengthen the imperial economy while holding the crownlands together."
 je_cow_1816_pru_reform_state:0 "Reform State"
 je_cow_1816_pru_reform_state_reason:0 "Prussia emerged from the Napoleonic Wars chastened but reformed. Deepen administrative, military, and economic modernization to prepare the kingdom for a larger German role."
 je_cow_1816_pru_german_dualism:0 "German Dualism"
 je_cow_1816_pru_german_dualism_reason:0 "Prussia and Austria now share the German Confederation uneasily. Build the strength needed to compete for leadership of the German states."
 je_cow_1816_rus_holy_alliance:0 "Holy Alliance"
 je_cow_1816_rus_holy_alliance_reason:0 "Russia is a guarantor of the restoration order and a decisive land power. Convert wartime prestige into durable influence across Europe."
 je_cow_1816_rus_imperial_borderlands:0 "Imperial Borderlands"
 je_cow_1816_rus_imperial_borderlands_reason:0 "From Poland and Finland to the Caucasus, Siberia, and Alaska, the Russian Empire is defined by its frontiers. Strengthen the empire's capacity to govern and develop its borderlands."
 je_cow_1816_tur_ottoman_recovery:0 "Ottoman Recovery"
 je_cow_1816_tur_ottoman_recovery_reason:0 "The Ottoman Empire begins 1816 with old institutions, ambitious provincial rulers, and growing European scrutiny. Restore central strength before crises multiply."
 je_cow_1816_tur_eastern_question:0 "Eastern Question"
 je_cow_1816_tur_eastern_question_reason:0 "Serbia, the Danubian Principalities, Egypt, Greece, and the great powers all test Ottoman authority. Build the resources needed to face the Eastern Question from a position of strength."
 je_cow_1816_chi_canton_system:0 "Canton System"
 je_cow_1816_chi_canton_system_reason:0 "Qing China controls foreign trade through the Canton System, but foreign merchants and opium pressure are growing. Preserve imperial control while strengthening the economy behind it."
 je_cow_1816_chi_inner_frontiers:0 "Qing Inner Frontiers"
 je_cow_1816_chi_inner_frontiers_reason:0 "The Qing imperial order rests on more than China proper: Tibet, Mongolia, Xinjiang, Korea, and frontier peoples all matter. Strengthen the realm before later crises test imperial cohesion."
 je_cow_1816_usa_era_good_feelings:0 "Era of Good Feelings"
 je_cow_1816_usa_era_good_feelings_reason:0 "The United States begins in a moment of nationalist confidence, but slavery, finance, and sectional balance remain unresolved. Grow the republic while preparing for the Missouri Question."
 je_cow_1816_usa_continental_frontier:0 "Continental Frontier"
 je_cow_1816_usa_continental_frontier_reason:0 "Florida, New Spain, Indigenous diplomacy, and western settlement define the early republic's frontier. Build the economy needed to support a continental future."
 je_cow_1816_spa_crisis_indies:0 "Crisis of the Indies"
 je_cow_1816_spa_crisis_indies_reason:0 "Spain's American empire is shaken by war, juntas, royalists, and revolutionaries. Regain the resources needed to decide whether to hold, negotiate, or fight for the Indies."
 je_cow_1816_spa_postwar_restoration:0 "Postwar Restoration"
 je_cow_1816_spa_postwar_restoration_reason:0 "Spain exits the Napoleonic age exhausted, indebted, and politically divided. Stabilize the restored monarchy and rebuild national capacity."
 je_cow_1816_por_atlantic_united_kingdom:0 "United Kingdom Across the Atlantic"
 je_cow_1816_por_atlantic_united_kingdom_reason:0 "Portugal's monarchy now spans Europe and Brazil. Strengthen the transatlantic kingdom before the balance between Lisbon and Rio breaks down."
 je_cow_1816_por_liberal_revolution:0 "Liberal Revolution"
 je_cow_1816_por_liberal_revolution_reason:0 "Portugal's future constitution and the return of the royal court are unresolved. Build the strength to survive the political storms ahead."
 je_cow_1816_brz_kingdom_tropics:0 "Kingdom in the Tropics"
 je_cow_1816_brz_kingdom_tropics_reason:0 "Brazil has become the seat of a monarchy rather than merely a colony. Develop the kingdom's economy and institutions inside the Portuguese imperial framework."
 je_cow_1816_brz_road_independence:0 "Road to Independence"
 je_cow_1816_brz_road_independence_reason:0 "Brazilian elites, ports, and provinces may not accept a return to colonial subordination. Build the strength needed for autonomy or independence."
 je_cow_1816_bic_maratha_war:0 "Before the Third Anglo-Maratha War"
 je_cow_1816_bic_maratha_war_reason:0 "The East India Company has not yet completed its domination of India. Prepare for the decisive confrontation with the Maratha powers."
 je_cow_1816_bic_company_raj:0 "Company Raj Foundations"
 je_cow_1816_bic_company_raj_reason:0 "Company rule depends on revenue, sepoy armies, ports, and princely allies. Expand the Company's administrative and economic base."
 je_cow_1816_per_qajar_restoration:0 "Qajar Restoration"
 je_cow_1816_per_qajar_restoration_reason:0 "Persia is recovering from war with Russia and the loss of Caucasian lands. Rebuild Qajar power before deciding how hard to press the frontier question."
 je_cow_1816_per_centralize_realm:0 "Centralize the Realm"
 je_cow_1816_per_centralize_realm_reason:0 "Tribal autonomy, provincial governors, and uneven taxation limit Qajar authority. Strengthen the economy to support deeper centralization."
 je_cow_1816_egy_muhammad_ali_state:0 "Muhammad Ali's State"
 je_cow_1816_egy_muhammad_ali_state_reason:0 "Egypt under Muhammad Ali has the chance to become a modernizing regional power. Expand the state economy that can support army, schools, and bureaucracy."
 je_cow_1816_egy_ambition:0 "Ambition of Egypt"
 je_cow_1816_egy_ambition_reason:0 "Egyptian ambitions stretch toward Sudan, Arabia, Crete, and the Levant. Build the material base for a more assertive Egyptian policy."
 je_cow_1816_net_united_kingdom_netherlands:0 "United Kingdom of the Netherlands"
 je_cow_1816_net_united_kingdom_netherlands_reason:0 "The new kingdom must integrate north and south, Dutch and Belgian provinces, and Luxembourg. Strengthen the state before regional divisions harden."
 je_cow_1816_net_colonial_commercial_revival:0 "Colonial Commercial Revival"
 je_cow_1816_net_colonial_commercial_revival_reason:0 "Dutch trade and colonial power must be rebuilt after the Napoleonic era. Use commerce and colonial administration to restore Dutch influence."
 je_cow_1816_swe_scandinavian_balance:0 "New Scandinavian Balance"
 je_cow_1816_swe_scandinavian_balance_reason:0 "Sweden has lost Finland and gained union with Norway. Stabilize the new Scandinavian balance and restore confidence in the monarchy."
 je_cow_1816_swe_baltic_ambition:0 "Baltic Ambition"
 je_cow_1816_swe_baltic_ambition_reason:0 "Sweden's old Baltic empire is gone, but influence can still be rebuilt through reform, diplomacy, and military credibility."
 je_cow_1816_den_postwar_denmark:0 "Postwar Denmark"
 je_cow_1816_den_postwar_denmark_reason:0 "Denmark begins after bankruptcy, fleet loss, and the loss of Norway. Recover the monarchy's finances and rebuild national capacity."
 je_cow_1816_den_schleswig_holstein:0 "Schleswig-Holstein Question"
 je_cow_1816_den_schleswig_holstein_reason:0 "Denmark's composite monarchy includes duchies with German ties and dynastic sensitivities. Strengthen the state before the duchy question becomes a crisis."
 je_cow_1816_jap_tokugawa_order:0 "Late Tokugawa Order"
 je_cow_1816_jap_tokugawa_order_reason:0 "The Tokugawa bakufu still governs through domain hierarchy, social order, and controlled contact. Preserve order while strengthening the realm."
 je_cow_1816_jap_rangaku_reform:0 "Rangaku and Reform"
 je_cow_1816_jap_rangaku_reform_reason:0 "Western learning and selective reform can prepare Japan before forced opening. Grow the economy that can support cautious modernization."
 je_cow_1816_kor_hermit_kingdom:0 "Hermit Kingdom"
 je_cow_1816_kor_hermit_kingdom_reason:0 "Joseon Korea relies on court hierarchy, Confucian order, and controlled foreign contact. Preserve the kingdom while strengthening its base."
 je_cow_1816_kor_court_reform:0 "Court Reform"
 je_cow_1816_kor_court_reform_reason:0 "Factional court politics and yangban privilege constrain the Korean state. Build capacity for reform without shattering the dynasty."
 je_cow_1816_sia_chakri_consolidation:0 "Chakri Consolidation"
 je_cow_1816_sia_chakri_consolidation_reason:0 "Bangkok's authority rests on tributary networks, court control, and regional diplomacy. Consolidate Siamese power from the center outward."
 je_cow_1816_sia_between_empires:0 "Between Empires"
 je_cow_1816_sia_between_empires_reason:0 "Siam must balance Dai Nam, Burma, Britain, and the Malay frontier. Strengthen the kingdom before imperial pressure intensifies."
 je_cow_1816_dai_nguyen_state_building:0 "Nguyen State-Building"
 je_cow_1816_dai_nguyen_state_building_reason:0 "The Nguyen dynasty is consolidating Vietnam after civil war and regional division. Strengthen the administration and economy of Dai Nam."
 je_cow_1816_dai_mekong_rivalry:0 "Mekong Rivalry"
 je_cow_1816_dai_mekong_rivalry_reason:0 "Cambodia, Laos, and the Mekong frontier draw Dai Nam and Siam into rivalry. Build the strength needed to compete for regional influence."
 je_cow_1816_bur_konbaung_ascendancy:0 "Konbaung Ascendancy"
 je_cow_1816_bur_konbaung_ascendancy_reason:0 "The Konbaung dynasty remains a formidable mainland power. Consolidate royal authority and economic strength after years of expansion."
 je_cow_1816_bur_company_frontier:0 "Company Frontier"
 je_cow_1816_bur_company_frontier_reason:0 "The frontier with British India will become increasingly dangerous. Prepare Burma for the pressures that may lead to the Anglo-Burmese wars."
 je_cow_1816_dei_restore_dutch_rule:0 "Restore Dutch Rule"
 je_cow_1816_dei_restore_dutch_rule_reason:0 "Dutch authority in the Indies must be restored after wartime disruption and British occupation. Rebuild colonial administration and confidence."
 je_cow_1816_dei_java_revenue_state:0 "Java Revenue State"
 je_cow_1816_dei_java_revenue_state_reason:0 "The colonial state depends on Java, taxation, plantations, and local elites. Expand the revenue base of the East Indies."
 je_cow_1816_pan_sikh_consolidation:0 "Sikh Empire Consolidation"
 je_cow_1816_pan_sikh_consolidation_reason:0 "The Sikh Empire has become a major power in the northwest. Strengthen Lahore's army, administration, and authority."
 je_cow_1816_pan_frontier_empires:0 "Frontier Between Empires"
 je_cow_1816_pan_frontier_empires_reason:0 "Punjab stands between Afghanistan, Kashmir, Sindh, and British India. Build the strength needed to survive among empires."
 je_cow_1816_maratha_confederacy_restored:0 "Confederacy Restored"
 je_cow_1816_maratha_confederacy_restored_reason:0 "The Maratha powers remain formidable but divided. Rebuild cohesion and decide whether the Peshwa can still lead the confederacy."
 je_cow_1816_maratha_subsidiary_alliance:0 "Subsidiary Alliance"
 je_cow_1816_maratha_subsidiary_alliance_reason:0 "Company influence threatens to bind Indian rulers through subsidiary alliances. Resist, accept, or manipulate that pressure from a position of strength."
 je_cow_1816_spanish_america_wars_independence:0 "Wars of Independence"
 je_cow_1816_spanish_america_wars_independence_reason:0 "Spanish America is split between royalist authority and revolutionary politics. Build the resources needed to survive the wars of independence."
 je_cow_1816_spanish_america_recognition_fragmentation:0 "Recognition and Fragmentation"
 je_cow_1816_spanish_america_recognition_fragmentation_reason:0 "Independence is only the beginning. Debt, recognition, legitimacy, and successor-state fragmentation will shape the new political order."
 je_cow_1816_italian_restoration:0 "Restoration Italy"
 je_cow_1816_italian_restoration_reason:0 "Italy has been reordered by restoration monarchies, Austrian influence, and post-Napoleonic settlements. Stabilize the state in the restored order."
 je_cow_1816_italian_risorgimento_seeds:0 "Seeds of the Risorgimento"
 je_cow_1816_italian_risorgimento_seeds_reason:0 "Liberal nationalism and reformist politics are not yet dominant, but their roots are present. Build the strength that could support a future Italian path."
 je_cow_1816_german_confederation_politics:0 "Confederation Politics"
 je_cow_1816_german_confederation_politics_reason:0 "The German Confederation preserves sovereignty while binding the German states into a federal order. Strengthen your state inside that system."
 je_cow_1816_german_economic_union:0 "German Economic Union"
 je_cow_1816_german_economic_union_reason:0 "Customs integration and market development can change the balance inside Germany. Expand the economy to prepare for a future customs union."
 je_cow_1816_balkan_ottoman_vassals:0 "Ottoman Vassals"
 je_cow_1816_balkan_ottoman_vassals_reason:0 "Balkan autonomy rests on tribute, local elites, and Ottoman suzerainty. Stabilize the principality before nationalist pressure grows."
 je_cow_1816_balkan_uprisings:0 "Balkan Uprisings"
 je_cow_1816_balkan_uprisings_reason:0 "The next decades may bring rebellion, reform, and great-power intervention. Build the capacity needed to survive or exploit Balkan unrest."
 je_cow_1816_afghan_fragmentation:0 "Afghan Fragmentation"
 je_cow_1816_afghan_fragmentation_reason:0 "The Durrani inheritance has fractured among rival Afghan rulers. Strengthen your state for reunification or survival."
 je_cow_1816_afghan_between_empires:0 "Between Empires"
 je_cow_1816_afghan_between_empires_reason:0 "Afghanistan sits between Persia, Punjab, Bukhara, and the Company frontier. Build the power needed to maneuver among stronger neighbors."
 je_cow_1816_central_asia_khanate_rivalries:0 "Khanate Rivalries"
 je_cow_1816_central_asia_khanate_rivalries_reason:0 "Oasis cities, steppe routes, raids, and dynastic legitimacy shape Central Asian politics. Strengthen the khanate before rivals do."
 je_cow_1816_central_asia_russian_shadow:0 "Russian Shadow"
 je_cow_1816_central_asia_russian_shadow_reason:0 "Russian forts and trade pressure will grow along the steppe frontier. Prepare the khanate before imperial pressure hardens."
 je_cow_1816_hai_two_haitis:0 "Two Haitis"
 je_cow_1816_hai_two_haitis_reason:0 "Haiti begins 1816 divided between rival political projects. Stabilize your side of the island before reunification or renewed conflict becomes possible."
 je_cow_1816_hai_french_recognition:0 "French Recognition"
 je_cow_1816_hai_french_recognition_reason:0 "France has not accepted Haitian independence on equal terms. Build the strength needed to face the coming recognition and indemnity crisis."
 je_cow_1816_ald_regency_corsairs:0 "Regency and Corsairs"
 je_cow_1816_ald_regency_corsairs_reason:0 "The Regency of Algiers remains tied to Ottoman legitimacy, corsair commerce, and Mediterranean diplomacy. Strengthen the regency's economy and navy-facing institutions."
 je_cow_1816_ald_road_to_algiers:0 "Road to Algiers"
 je_cow_1816_ald_road_to_algiers_reason:0 "European pressure against Algiers will grow over the coming decades. Prepare for the diplomatic crisis that could lead to invasion."
 je_cow_1816_mor_makhzen_tribes:0 "Makhzen and the Tribes"
 je_cow_1816_mor_makhzen_tribes_reason:0 "Morocco's ruler must balance makhzen authority with tribal autonomy and local power. Strengthen the realm from the center outward."
 je_cow_1816_mor_maghreb_pressure:0 "Atlantic and Maghreb Pressure"
 je_cow_1816_mor_maghreb_pressure_reason:0 "Trade, borderlands, and European diplomacy will increasingly test Morocco. Build the state before outside pressure intensifies."
 je_cow_1816_barbary_autonomy:0 "Barbary Autonomy"
 je_cow_1816_barbary_autonomy_reason:0 "Tunis and Tripolitania balance Ottoman connection, local dynasties, and European pressure. Preserve autonomy by strengthening the state."
 je_cow_1816_barbary_mediterranean_commerce:0 "Mediterranean Commerce"
 je_cow_1816_barbary_mediterranean_commerce_reason:0 "Corsair decline, trade, and naval diplomacy are reshaping the central Mediterranean. Adapt the economy to the new order."
 je_cow_1816_sok_caliphate_consolidation:0 "Caliphate Consolidation"
 je_cow_1816_sok_caliphate_consolidation_reason:0 "The Sokoto Caliphate must turn conquest and reform into durable government. Strengthen administration, scholarship, and emirate loyalty."
 je_cow_1816_sok_jihad_legacy:0 "West African Jihad Legacy"
 je_cow_1816_sok_jihad_legacy_reason:0 "Sokoto's legitimacy rests on reform, expansion, and religious authority. Build the capacity to lead the region."
 je_cow_1816_mad_radama_kingdom:0 "Radama's Kingdom"
 je_cow_1816_mad_radama_kingdom_reason:0 "Imerina has the chance to unify Madagascar and build a stronger army and state. Expand the kingdom's base of power."
 je_cow_1816_mad_foreign_mission_trade:0 "Foreign Mission and Trade"
 je_cow_1816_mad_foreign_mission_trade_reason:0 "British and French contact, education, missions, and coastal trade can reshape Madagascar. Use foreign ties without losing royal control."
 je_cow_1816_zul_state_formation:0 "Zulu State Formation"
 je_cow_1816_zul_state_formation_reason:0 "Zulu power is emerging through military organization and political consolidation. Build a durable state from regional upheaval."
 je_cow_1816_zul_highveld_upheaval:0 "Highveld Upheaval"
 je_cow_1816_zul_highveld_upheaval_reason:0 "Regional warfare, migration, and shifting alliances will transform southern Africa. Strengthen Zulu power before rivals close in."
 je_cow_1816_com_southern_plains:0 "Lords of the Southern Plains"
 je_cow_1816_com_southern_plains_reason:0 "Comancheria rests on horses, raiding, trade, and diplomacy with New Spain and the United States. Strengthen the plains power network."
 je_cow_1816_com_band_confederacy:0 "Band Confederacy"
 je_cow_1816_com_band_confederacy_reason:0 "Comancheria is not a conventional centralized state. Keep the bands coherent enough for playable politics without losing their distinctive society."
 je_cow_1816_lkt_western_expansion:0 "Western Expansion"
 je_cow_1816_lkt_western_expansion_reason:0 "Lakota power is moving westward across the northern plains. Build strength to dominate new hunting grounds and diplomacy."
 je_cow_1816_lkt_plains_trade:0 "Plains Trade Network"
 je_cow_1816_lkt_plains_trade_reason:0 "Horses, bison, trade posts, and intertribal diplomacy define the plains. Strengthen the Lakota position in that network."
 je_cow_1816_haw_kamehameha_kingdom:0 "Kamehameha's Kingdom"
 je_cow_1816_haw_kamehameha_kingdom_reason:0 "Hawaii has been unified under Kamehameha's dynasty, but royal authority must still be consolidated. Strengthen the kingdom's economy and state."
 je_cow_1816_haw_pacific_crossroads:0 "Pacific Crossroads"
 je_cow_1816_haw_pacific_crossroads_reason:0 "Whalers, traders, missionaries, and foreign navies will increasingly reach Hawaii. Build capacity before outside influence dominates the islands."
 je_cow_1816_hbc_fur_trade_empire:0 "Fur Trade Empire"
 je_cow_1816_hbc_fur_trade_empire_reason:0 "The Hudson's Bay Company rules through posts, trade routes, and relations with Indigenous powers. Strengthen the commercial network."
 je_cow_1816_hbc_red_river_bna:0 "Red River and British North America"
 je_cow_1816_hbc_red_river_bna_reason:0 "Settlement pressure and colonial integration will test company rule. Prepare the company for a future beyond the fur trade."

