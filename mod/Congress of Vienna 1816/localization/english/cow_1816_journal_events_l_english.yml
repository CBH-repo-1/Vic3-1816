 cow_1816_journal.1.t:0 "Postwar Settlement Complete"
 cow_1816_journal.1.d:0 "The goals set by Postwar Settlement have been met, giving [ROOT.GetCountry.GetName] a brief but useful period of momentum. The achievement does not settle every question raised in 1816, but it proves that the state can still turn ambition into policy."
 cow_1816_journal.1.f:0 "The chancelleries and court circles now treat this achievement as proof that the state can still shape events beyond its borders."
 cow_1816_journal.1.a:0 "Our position is stronger."
 cow_1816_journal.1.b:0 "Direct the gains toward commercial momentum."
